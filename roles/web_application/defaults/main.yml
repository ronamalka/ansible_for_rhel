---
# Web application defaults
web_app_packages:
  - httpd
  - firewalld
web_app_service: httpd
web_app_firewall_service: http
web_app_port: 80

# Host stage mapping when Controller inventory lacks host_vars.
web_app_host_stages:
  node1: dev
  node2: prod
  node3: dev

# Page body text (mirrors inventories/workshop/group_vars/web.yml for Controller runs).
dev_content: "Ansible-managed development content"
prod_content: "Ansible-managed production content"
