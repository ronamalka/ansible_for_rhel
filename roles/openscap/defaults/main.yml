---
# OpenSCAP defaults for RHEL 8
openscap_content_path: /usr/share/xml/scap/ssg/content/ssg-rhel8-ds.xml
openscap_profile: xccdf_org.ssgproject.content_profile_cis
openscap_report_dir: /var/log/ansible-demo/openscap
openscap_run_remediation: false
openscap_packages:
  - openscap-scanner
  - scap-security-guide
# Skip remediations that break Ansible privilege escalation (Workshop Credential uses passwordless sudo).
openscap_skip_remediation_rules:
  - xccdf_org.ssgproject.content_rule_sudo_remove_nopasswd

openscap_workshop_sudoers_dropin: /etc/sudoers.d/90-cloud-init-users
openscap_workshop_sudoers_content: |
  ec2-user ALL=(ALL) NOPASSWD:ALL
