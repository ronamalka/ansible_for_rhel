---
# OpenShift API connection (injected by AAP OpenShift credential when attached to job template)
openshift_k8s_host: "{{ host | default('') }}"
openshift_k8s_api_key: "{{ oauth_token | default('') }}"
openshift_k8s_validate_certs: false

# Application settings (survey overrides)
target_namespace: demo-web
app_name: demo-web
create_namespace: true
deploy_method: auto  # auto | tekton | direct

# Tekton resource names
openshift_app_source_configmap: demo-web-source
openshift_app_pipeline_name: demo-web-deploy
openshift_app_serviceaccount: demo-web-pipeline

# Direct-deploy fallback image (no build required)
openshift_app_direct_image: registry.redhat.io/ubi9/python-311:latest

# Paths relative to repo root on controller
openshift_app_source_dir: "{{ playbook_dir }}/../apps/demo-web"
openshift_tekton_dir: "{{ playbook_dir }}/../ocp/tekton"

# Timeouts
openshift_app_pipeline_timeout: 600
openshift_app_route_timeout: 180

# K8s DNS-1123 label pattern for namespace validation
openshift_app_namespace_pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
