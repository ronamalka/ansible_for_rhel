---
# Default stage for web servers; override per-host as needed.
stage: dev

# Host stage mapping (shared by deploy and verify playbooks).
web_app_host_stages:
  node1: dev
  node2: prod
  node3: dev

# Application content defaults (overridden by Controller survey or extra vars).
dev_content: "Ansible-managed development content"
prod_content: "Ansible-managed production content"
