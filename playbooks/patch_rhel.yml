---
- name: Seed demo patch packages before patching
  hosts: web
  become: true
  tasks:
    - name: Run demo patch seed role when survey requests it
      ansible.builtin.include_role:
        name: demo_patch_seed
      when: seed_demo_packages | default(false) | bool

- name: Patch RHEL web servers
  hosts: web
  become: true
  vars:
    patch_security_only: "{{ security_only | default(false) }}"
    patch_reboot: "{{ reboot_after_patch | default(false) }}"
  roles:
    - rhel_patching

- name: Aggregate patch results for portal and job stdout
  hosts: web
  gather_facts: false
  tasks:
    - name: Print portal-visible per-node package summary
      ansible.builtin.debug:
        msg: |
          ===== DEMO PATCH PACKAGE SUMMARY (portal) =====
          {% for host in groups['web'] | sort %}
          {{ host }}: {{ hostvars[host].rhel_patching_updated_package_names | default([]) | join(', ') if (hostvars[host].rhel_patching_updated_package_names | default([]) | length > 0) else 'none' }}
          {% endfor %}
          ===== END DEMO PATCH PACKAGE SUMMARY (portal) =====
      run_once: true
