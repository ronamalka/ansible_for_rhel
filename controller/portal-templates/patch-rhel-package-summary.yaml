apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: demo-patch-rhel-package-summary
  title: DEMO - Patch RHEL Servers (with package summary)
  description: >-
    Patch RHEL web servers and stream per-node package changes into the portal
    launch step log. Uses the same Controller job template as the auto-generated
    Patch RHEL tile.
  tags:
    - demo-self-service
    - ansible
    - patching
spec:
  owner: group:default/demo-self-service
  type: service

  parameters:
    - title: Patch options
      required:
        - security_only
        - reboot_after_patch
      properties:
        security_only:
          title: Security updates only?
          description: When enabled, only security-related packages are updated.
          type: string
          enum:
            - "false"
            - "true"
          default: "false"
        reboot_after_patch:
          title: Reboot after patching?
          description: Reboot hosts when kernel or other updates require it (needs-restarting -r).
          type: string
          enum:
            - "false"
            - "true"
          default: "false"

  steps:
    - id: launch-job
      name: DEMO - Patch RHEL Servers
      action: rhaap:launch-job-template
      input:
        token: ${{ secrets.aapToken }}
        values:
          template: DEMO - Patch RHEL Servers
          extraVariables:
            security_only: ${{ parameters.security_only }}
            reboot_after_patch: ${{ parameters.reboot_after_patch }}

  output:
    text:
      - title: Patch job completed
        content: |
          **Job ID:** ${{ steps['launch-job'].output.data.id }}
          **Status:** ${{ steps['launch-job'].output.data.status }}

          Per-node package changes were streamed in the **Create Task** step log above
          (`DEMO_PATCH_PORTAL` lines and the `DEMO PATCH PACKAGE SUMMARY` block).
    links:
      - title: View full job in Ansible Automation Platform
        url: ${{ steps['launch-job'].output.data.url }}
