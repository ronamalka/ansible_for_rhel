apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: demo-verify-web-app-summary
  title: DEMO - Verify Web Application (with verify summary)
  description: >-
    Verify deployed web applications on RHEL hosts and stream per-node URL,
    HTTP status, stage, and content snippet into the portal launch step log.
    Uses the same Controller job template as the auto-generated Verify Web
    Application tile.
  tags:
    - demo-self-service
    - ansible
    - verification
spec:
  owner: group:default/demo-self-service
  type: service

  steps:
    - id: launch-job
      name: DEMO - Verify Web Application
      action: rhaap:launch-job-template
      input:
        token: ${{ secrets.aapToken }}
        values:
          template: DEMO - Verify Web Application

  output:
    text:
      - title: Verify job completed
        content: |
          **Job ID:** ${{ steps['launch-job'].output.data.id }}
          **Status:** ${{ steps['launch-job'].output.data.status }}

          Per-node verify checks were streamed in the **Create Task** step log above
          (`DEMO_VERIFY_PORTAL` lines and the `DEMO VERIFY SUMMARY` block).
    links:
      - title: View full job in Ansible Automation Platform
        url: ${{ steps['launch-job'].output.data.url }}
