apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-web-pipeline
  labels:
    app.kubernetes.io/part-of: ansible-rhel-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-web-pipeline
  labels:
    app.kubernetes.io/part-of: ansible-rhel-demo
rules:
  - apiGroups: ["", "apps", "route.openshift.io", "image.openshift.io"]
    resources:
      - configmaps
      - secrets
      - pods
      - pods/log
      - services
      - deployments
      - routes
      - imagestreams
      - imagestreamtags
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-web-pipeline
  labels:
    app.kubernetes.io/part-of: ansible-rhel-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-web-pipeline
subjects:
  - kind: ServiceAccount
    name: demo-web-pipeline
